    <link rel="stylesheet" href="../styles/produits_style.css">
    <style>
        .grid-produits {
    display: flex;
    /* Flex horizontal au lieu de grid */
    gap: 1rem;
    overflow-x: auto;
    /* permet le scroll horizontal */
    padding-bottom: 10px;
    /* pour espace visuel sous les cartes */
    scroll-behavior: smooth;
    /* scroll fluide */
    }
    
    .grid-produits::-webkit-scrollbar {
        height: 8px;
    }
    
    .grid-produits::-webkit-scrollbar-track {
        background: transparent;
    }
    
    .grid-produits::-webkit-scrollbar-thumb {
        background-color: var(--border);
        border-radius: 4px;
    }
    </style>
</head>

<body>
    <header>
        <div class="container nav">
            <a class="brand" href="../">
                <span class="logo" aria-hidden="true">TM</span>
                <span>TongaMarket</span>
            </a>
            <nav class="nav-links" aria-label="Navigation principale">
                <a href="../asset/logo/logo-header-bark.svga>
                <a href="./">Produits</a>
                <button id="toggleTheme" class="mode-toggle" aria-label="Changer le thème (clair/sombre)">
                    <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path
                            d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.535-7.535-1.414 1.414M7.88 16.12l-1.414 1.414m0-11.314 1.414 1.414M16.12 16.12l1.414 1.414" />
                    </svg>
                    <svg id="iconMoon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <span id="themeLabel">Clair</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="container" id="catalogue">
        <!-- Les produits seront chargés ici dynamiquement via produitsLoader.js -->
    </main>

    <footer>
        <div class="container foot">
            <span>© <span id="year"></span> TongaMarketplace</span>
            <div style="display:flex; gap:12px">
                <a href="../asset/logo/logo-header-bark.svgrketPlace/cgv.html">CGV</a>
                <a href="../asset/logo/logo-header-bark.svgrketPlace/retours.html">Retours</a>
                <a href="../asset/logo/logo-header-bark.svgrketPlace/contact.html">Contact</a>
            </div>
        </div>
    </footer>

    <a class="wa-fab" href="https://wa.me/24177067949?text=Bonjour%2C%20je%20souhaite%20des%20informations%20sur%20vos%20produits" rel="noopener"
        aria-label="Ouvrir WhatsApp pour commander">WhatsApp</a>

    <script src="../scripts/produitsLoader.js"></script>
    <script src="../asset/logo/logo-header-bark.svgt.js"></script>
    <script>
        (function initTheme() {
            const root = document.documentElement;
            const saved = localStorage.getItem('theme');
            const preferDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = saved ? saved === 'dark' : preferDark;
            root.classList.toggle('dark', isDark);
            updateToggle(isDark);
        })();

        document.getElementById('toggleTheme').addEventListener('click', () => {
            const root = document.documentElement;
            const nowDark = !root.classList.contains('dark');
            root.classList.toggle('dark', nowDark);
            localStorage.setItem('theme', nowDark ? 'dark' : 'light');
            updateToggle(nowDark);
        });

        function updateToggle(dark) {
            document.getElementById('iconSun').style.display = dark ? 'none' : '';
            document.getElementById('iconMoon').style.display = dark ? '' : 'none';
            document.getElementById('themeLabel').textContent = dark ? 'Sombre' : 'Clair';
        }

        document.getElementById('year').textContent = new Date().getFullYear();

    </script>
    <!-- Bouton Panier flottant -->
    <a href="panier.html" class="cart-fab" aria-label="Voir le panier"><img width="24" height="24" class="ShopCart1" src="https://img.icons8.com/material-outlined/24/shopping-cart--v1.png" alt="shopping-cart--v1" />Panier</a>

</body>

</html>
