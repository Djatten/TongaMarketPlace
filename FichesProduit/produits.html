<!doctype html>
<html lang="fr" class="no-js">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Produits — TongaMarketplace</title>
    <link rel="icon" href="../asset/logo/logo-header-light.svg" />
    <link rel="stylesheet" href="../styles/produits_style.css">
    <style>
        .grid-produits {
            display: flex;
            /* Flex horizontal au lieu de grid */
            gap: 1rem;
            overflow-x: auto;
            /* permet le scroll horizontal */
            padding-bottom: 10px;
            /* pour espace visuel sous les cartes */
            scroll-behavior: smooth;
            /* scroll fluide */
        }

        .grid-produits::-webkit-scrollbar {
            height: 8px;
        }

        .grid-produits::-webkit-scrollbar-track {
            background: transparent;
        }

        .grid-produits::-webkit-scrollbar-thumb {
            background-color: var(--border);
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <div class="container nav"> 
            <a class="brand" href="../">
                <img id="logoHeader" src="../asset/logo/logo-header-light.svg" alt="TongaMarket" width="36" height="36" />
                <span>TongaMarket</span>
            </a>
            
            <nav class="nav-links" aria-label="Navigation principale">
                <a href="../">Accueil</a>
                <a href="#catalogue">Produits</a>
                <button id="toggleTheme" class="mode-toggle" aria-label="Changer le thème (clair/sombre)">
                    <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path
                            d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.535-7.535-1.414 1.414M7.88 16.12l-1.414 1.414m0-11.314 1.414 1.414M16.12 16.12l1.414 1.414" />
                    </svg>
                    <svg id="iconMoon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <span id="themeLabel">Clair</span>
                </button>
            </nav>

        </div>
    </header>
    <main class="container" id="catalogue"> <!-- Les produits seront chargés ici dynamiquement via produitsLoader.js -->
    </main>
    <footer>
        <div class="container foot"> 
            <span>© <span id="year"></span> TongaMarketplace</span>
            <div style="display:flex; gap:12px"> <a href="../asset/logo/logo-header-bark.svgrketPlace/cgv.html">CGV</a>
                <a href="../asset/logo/logo-header-bark.svgrketPlace/retours.html">Retours</a> 
                <a href="../asset/logo/logo-header-bark.svgrketPlace/contact.html">Contact</a> 
            </div>
        </div>
    </footer> 
    <a class="wa-fab" href="https://wa.me/24177067949?text=Bonjour%2C%20je%20souhaite%20des%20informations%20sur%20vos%20produits" rel="noopener" aria-label="Ouvrir WhatsApp pour commander">WhatsApp</a>

    <script src="../scripts/produitsLoader.js"></script>
    <script src="../scripts/produitsSpecifiquesLoader.js"></script>
    <script src="../scripts/cart.js"></script>
    <script>
        (function () {
            const root = document.documentElement;
            const btn = document.getElementById('toggleTheme');
            const iconSun = document.getElementById('iconSun');
            const iconMoon = document.getElementById('iconMoon');
            const label = document.getElementById('themeLabel');
            const logo = document.getElementById('logoHeader');
            const favicon = document.querySelector('link[rel="icon"]');

            // Chemins fournis
            const logos = {
                light: '../asset/logo/logo-header-light.svg',
                dark: '../asset/logo/logo-header-bark.svg'
            };

            function applyTheme(theme) {
                const isDark = theme === 'dark';
                root.classList.toggle('dark', isDark);
                if (iconSun && iconMoon) {
                    iconSun.style.display = isDark ? 'none' : '';
                    iconMoon.style.display = isDark ? '' : 'none';
                }
                if (label) label.textContent = isDark ? 'Sombre' : 'Clair';
                if (logo) logo.src = isDark ? logos.dark : logos.light;
                if (favicon) favicon.href = isDark ? logos.dark : logos.light;
                localStorage.setItem('theme', theme);
            }

            // Thème initial
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(saved || (prefersDark ? 'dark' : 'light'));

            // Toggle
            if (btn) {
                btn.addEventListener('click', () => {
                    const newTheme = root.classList.contains('dark') ? 'light' : 'dark';
                    applyTheme(newTheme);
                });
            }

            // Si tu veux réagir aux changements système (optionnel)
            if (window.matchMedia) {
                const mql = window.matchMedia('(prefers-color-scheme: dark)');
                if (mql.addEventListener) {
                    mql.addEventListener('change', e => {
                        // Ne pas écraser le choix utilisateur s'il a cliqué (on garde seulement si aucun choix dans localStorage)
                        if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
                    });
                } else if (mql.addListener) {
                    mql.addListener(e => {
                        if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
                    });
                }
            }
        })();
    </script>

    <!-- Bouton Panier flottant -->
    <a href="../asset/logo/logo-header-bark.svgit/panier.html" class="cart-fab"
        aria-label="Voir le panier">
        <img width="24" height="24" class="ShopCart1" src="https://img.icons8.com/material-outlined/24/shopping-cart--v1.png" alt="shopping-cart--v1" />Panier</a>
</body>

</html>
